<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Family">
  <meta name="theme-color" content="#0a0a0d">
  <title>Family Dashboard</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow-x:hidden; }
    body { background:#0a0a0d; color:#ffffff; font-family:system-ui,-apple-system,sans-serif; min-height:100vh; }
    .app { width:100%; display:flex; flex-direction:column; min-height:100vh; }

    /* TOP BAR */
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:8px 2px 7px border-bottom:1px solid rgba(255,255,255,0.07); }
    .title { font-size:clamp(17px,4.4vw,22px); font-weight:800; letter-spacing:-0.5px; background:linear-gradient(90deg,#fff 30%,#60b4ff 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { font-size:10px; color:#5dd68a; margin-top:2px; }
    .clock-time { font-size:clamp(29px,7.2vw,49px); font-weight:800; letter-spacing:-2px; color:#fff; text-align:right; line-height:1; }
    .clock-sec { font-size:clamp(14px,3.3vw,18px); color:#555; margin-left:2px; }
    .clock-date { font-size:11px; color:#777; margin-top:3px; text-align:right; }

    /* WEEK STRIP */
    .week { display:flex; gap:2px; padding:6px 2px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .week-day { flex:1; text-align:center; padding:5px 2px border-radius:8px; border:1px solid transparent; }
    .week-day.today { background:linear-gradient(135deg,#2a5298,#1a73e8); border-color:rgba(96,180,255,0.5); }
    .week-day.wknd { background:rgba(255,255,255,0.02); }
    .week-day.normal { background:rgba(255,255,255,0.05); }
    .week-label { font-size:8px; letter-spacing:0.06em; margin-bottom:2px; }
    .week-date { font-size:14px; font-weight:700; }
    .week-day.today .week-label, .week-day.today .week-date { color:#fff; }
    .week-day.wknd .week-label, .week-day.wknd .week-date { color:#444; }
    .week-day.normal .week-label, .week-day.normal .week-date { color:#888; }

    /* GRID */
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:7px 2px 9px; flex:1; }
    .section-label { font-size:8px; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:5px; color:#888; }

    /* CARDS */
    .card { border-radius:10px; padding:5px 3px; box-sizing:border-box; height:100%; display:flex; flex-direction:column; }
    .card-dark { background:#16161a; }
    .card-blue { background:#0f2440; border:1.5px solid rgba(96,180,255,0.35); }
    .card-blue2 { background:#0d1e2e; border:1.5px solid rgba(96,180,255,0.20); }
    .card-orange { border:1px solid rgba(255,170,85,0.30); background:#16161a; }
    .card-bluel { border:1px solid rgba(96,180,255,0.30); background:#16161a; }

    /* CHILD CARD */
    .child-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .child-name { display:flex; align-items:center; gap:4px; }
    .child-name span:last-child { font-size:14px; font-weight:700; }
    .ends-badge { font-size:8px; padding:2px 5px border-radius:20px; }
    .starts-badge { display:flex; align-items:center; gap:5px; margin-bottom:8px; border-radius:8px; padding:3px 5px }
    .starts-label { font-size:7px; letter-spacing:0.08em; margin-bottom:1px; }
    .starts-time { font-size:19px; font-weight:800; line-height:1; }
    .lessons-count-label { font-size:8px; color:#aaa; letter-spacing:0.08em; margin-bottom:2px; text-align:right; }
    .lessons-count { font-size:14px; font-weight:600; color:#fff; text-align:right; }
    .lesson-row { display:flex; align-items:center; gap:4px; padding:2px 2px border-radius:5px; border:1px solid transparent; }
    .lesson-row.current { border:1px solid; }
    .lesson-row.past { opacity:0.38; }
    .lesson-time { font-size:14px; font-weight:600; color:#fff; min-width:46px; flex-shrink:0; }
    .lesson-subj { font-size:14px; color:#fff; }
    .now-badge { margin-left:auto; font-size:8px; padding:1px 4px border-radius:7px; }
    .no-school { color:#888; font-size:14px; font-style:italic; padding:4px 1px }

    /* EXAM CARD */
    .exam-header { display:flex; align-items:center; gap:4px; margin-bottom:9px; }
    .exam-title { font-size:15px; font-weight:700; }
    .exam-tag { margin-left:auto; font-size:8px; color:#888; letter-spacing:0.08em; }
    .exam-row { display:flex; align-items:center; gap:7px; padding:3px 5px border-radius:9px; background:rgba(255,255,255,0.04); margin-bottom:7px; border:1px solid; }
    .exam-count { display:flex; flex-direction:column; align-items:center; flex-shrink:0; width:52px; }
    .exam-date-lbl { font-size:12px; font-weight:700; line-height:1; }
    .exam-days-num { font-size:19px; font-weight:800; line-height:1; margin-top:3px; }
    .exam-days-lbl { font-size:8px; line-height:1; margin-top:2px; white-space:nowrap; }
    .exam-divider { width:1px; align-self:stretch; flex-shrink:0; }
    .exam-subject { font-size:14px; font-weight:600; color:#fff; line-height:1.3; }
    .exam-detail { font-size:11px; color:#999; margin-top:2px; line-height:1.3; }

    /* CALENDAR */
    .cal-row { display:flex; align-items:flex-start; gap:6px; margin-bottom:9px; }
    .cal-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-top:5px; flex-shrink:0; }
    .cal-time { font-size:14px; color:#aaa; background:rgba(255,255,255,0.08); padding:1px 4px border-radius:4px; margin-right:5px; }
    .cal-title { font-size:15px; font-weight:500; color:#fff; }
    .cal-person { font-size:12px; margin-left:5px; padding:1px 5px border-radius:8px; }
    .cal-loc { font-size:11px; color:#666; margin-top:1px; }
    .cal-empty { color:#777; font-size:14px; font-style:italic; }

    /* WEATHER */
    .wx-top { display:flex; align-items:center; gap:8px; }
    .wx-icon { font-size:36px; line-height:1; flex-shrink:0; }
    .wx-label { font-size:10px; font-weight:700; letter-spacing:0.1em; }
    .wx-date { font-size:10px; color:#445566; }
    .wx-condition { font-size:12px; color:#c0d8e8; margin-top:2px; }
    .wx-temp { display:flex; align-items:baseline; gap:4px; border-top:1px solid rgba(255,255,255,0.07); padding-top:8px; margin-top:8px; }
    .wx-high { font-size:32px; font-weight:800; color:#fff; line-height:1; }
    .wx-sep { font-size:15px; color:#5a80a0; }
    .wx-low { font-size:19px; font-weight:600; color:#5a80a0; }
    .wx-unit { font-size:10px; color:#445566; margin-left:2px; }
    .wx-pills { display:flex; gap:6px; margin-top:8px; }
    .wx-pill { flex:1; border-radius:8px; padding:6px 7px display:flex; align-items:center; gap:5px; }
    .wx-pill-icon { font-size:14px; flex-shrink:0; }
    .wx-pill-val { font-size:15px; font-weight:700; line-height:1; }
    .wx-pill-unit { font-size:8px; font-weight:400; }
    .wx-pill-lbl { font-size:8px; color:#4a6a80; letter-spacing:0.1em; margin-top:1px; }
    .wx-wind-pill { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); }
    .loading { color:#555; font-size:14px; text-align:center; padding:16px }

    /* FOOTER */
    .footer { padding:4px 2px border-top:1px solid rgba(255,255,255,0.05); font-size:8px; color:#333; }

    /* COUNTDOWN HIGHLIGHTS */
    #countdown-section { display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:0 2px 9px; }
    .cd-card { border-radius:14px; padding:13px 11px box-sizing:border-box; display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; overflow:hidden; }
    .cd-school { background:linear-gradient(135deg,#1a4a1a,#0d2b0d); border:1.5px solid #4caf5066; }
    .cd-greece { background:linear-gradient(135deg,#1a2a4a,#0d1830); border:1.5px solid #60b4ff66; }
    .cd-emoji { font-size:36px; line-height:1; margin-bottom:8px; }
    .cd-days { font-size:53px; font-weight:800; line-height:1; letter-spacing:-2px; }
    .cd-school .cd-days { color:#69d46c; }
    .cd-greece .cd-days { color:#60b4ff; }
    .cd-days-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; margin-top:2px; margin-bottom:10px; }
    .cd-school .cd-days-label { color:#4caf5099; }
    .cd-greece .cd-days-label { color:#60b4ff99; }
    .cd-title { font-size:14px; font-weight:700; line-height:1.3; }
    .cd-school .cd-title { color:#a5d6a7; }
    .cd-greece .cd-title { color:#90caf9; }
    .cd-date { font-size:10px; margin-top:4px; }
    .cd-school .cd-date { color:#2e7d3266; color:#4caf5066; }
    .cd-greece .cd-date { color:#60b4ff55; }
    .cd-glow-school { position:absolute; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,#4caf5015,transparent 70%); top:-20px; right:-20px; }
    .cd-glow-greece { position:absolute; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,#60b4ff15,transparent 70%); top:-20px; left:-20px; }
    .cd-section-label { grid-column:1/-1; font-size:8px; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin-bottom:-4px; padding-top:3px; }
  </style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────────
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYNAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const WDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const PCOLORS = {Helen:"#60b4ff", Sofia:"#ffaa55", Erkki:"#5dd68a"};

function pad(n){ return String(n).padStart(2,"0"); }
function getDateStr(off){
  off = off || 0;
  const d = new Date(); d.setDate(d.getDate()+off);
  return d.toISOString().slice(0,10);
}
function getDow(off){ off=off||0; const d=new Date(); d.setDate(d.getDate()+off); return d.getDay(); }
function getDayName(off){ off=off||0; const d=new Date(); d.setDate(d.getDate()+off); return DAYNAMES[d.getDay()]; }
function getNextSchoolOff(){
  for(let i=1;i<=7;i++){ const d=getDow(i); if(d>=1&&d<=5) return i; }
  return 1;
}
function toMins(t){ const p=t.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function daysUntil(ds){ const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(ds)-t)/86400000); }
function fmtDate(ds){ const d=new Date(ds); return pad(d.getDate())+"."+pad(d.getMonth()+1)+"."; }
function el(tag,cls,html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html) e.innerHTML=html; return e; }

// ── CLOCK ─────────────────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  document.getElementById("clock-time").innerHTML =
    pad(now.getHours())+":"+pad(now.getMinutes())+"<span class='clock-sec'>"+pad(now.getSeconds())+"</span>";
  document.getElementById("clock-date").textContent =
    DAYNAMES[now.getDay()]+", "+now.getDate()+" "+MONTHS[now.getMonth()];
}
setInterval(updateClock, 1000);
updateClock();

// ── WEEK STRIP ────────────────────────────────────────────────────────
function buildWeekStrip(){
  const strip = document.getElementById("week-strip");
  const base = new Date();
  const labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  for(let i=0;i<7;i++){
    const d = new Date(base);
    d.setDate(base.getDate() - ((base.getDay()+6)%7) + i);
    const isToday = d.toDateString()===base.toDateString();
    const isWknd = i>=5;
    const div = el("div", "week-day "+(isToday?"today":isWknd?"wknd":"normal"));
    div.innerHTML = "<div class='week-label'>"+labels[i]+"</div><div class='week-date'>"+d.getDate()+"</div>";
    strip.appendChild(div);
  }
}
buildWeekStrip();

// ── BUILD CHILD CARD ──────────────────────────────────────────────────
function buildChildCard(name, color, emoji, lessons, isToday){
  const now = new Date();
  const nowMins = now.getHours()*60+now.getMinutes();
  const noSchool = !lessons || lessons.length===0;

  const card = el("div","card card-dark");
  card.style.border = "1.5px solid "+color+"66";

  // Header
  const hdr = el("div","child-header");
  const nameDiv = el("div","child-name");
  nameDiv.innerHTML = "<span style='font-size:14px'>"+emoji+"</span><span style='color:"+color+"'>"+name+"</span>";
  hdr.appendChild(nameDiv);
  if(!noSchool){
    const endTime = lessons[lessons.length-1].time.split("-")[1];
    const badge = el("span","ends-badge");
    badge.style.color=color; badge.style.background=color+"22";
    badge.textContent="ends "+endTime;
    hdr.appendChild(badge);
  }
  card.appendChild(hdr);

  if(noSchool){
    card.appendChild(el("div","no-school","No school 🎉"));
    return card;
  }

  const startTime = lessons[0].time.split("-")[0];

  // Starts badge
  const sb = el("div","starts-badge");
  sb.style.background=color+"22"; sb.style.border="1.5px solid "+color+"77";
  sb.innerHTML="<div><div class='starts-label' style='color:"+color+"'>SCHOOL STARTS</div>"+
    "<div class='starts-time' style='color:"+color+"'>"+startTime+"</div></div>"+
    "<div style='margin-left:auto;text-align:right'><div class='lessons-count-label'>LESSONS</div>"+
    "<div class='lessons-count'>"+lessons.length+"</div></div>";
  card.appendChild(sb);

  // Lessons
  const lessonsDiv = el("div");
  lessonsDiv.style.display="flex"; lessonsDiv.style.flexDirection="column"; lessonsDiv.style.gap="2px"; lessonsDiv.style.flex="1";
  lessons.forEach(function(l){
    const parts = l.time.split("-");
    const s=toMins(parts[0]), e=toMins(parts[1]);
    const cur = isToday && nowMins>=s && nowMins<=e;
    const past = isToday && nowMins>e;
    const row = el("div","lesson-row"+(cur?" current":"")+(past?" past":""));
    if(cur){ row.style.background=color+"22"; row.style.borderColor=color+"55"; }
    row.innerHTML="<span class='lesson-time'>"+(parts[0])+"</span><span class='lesson-subj'>"+l.subject+"</span>";
    if(cur){
      const nb=el("span","now-badge");
      nb.style.color=color; nb.style.background=color+"33"; nb.textContent="NOW";
      row.appendChild(nb);
    }
    lessonsDiv.appendChild(row);
  });
  card.appendChild(lessonsDiv);
  return card;
}

// ── BUILD EXAM CARD ───────────────────────────────────────────────────
function buildExamCard(name, color, emoji, exams){
  const today = getDateStr(0);
  const upcoming = exams.filter(function(e){ return e.date>=today; })
    .sort(function(a,b){ return a.date<b.date?-1:1; });

  const card = el("div","card card-dark");
  card.style.border="1.5px solid "+color+"44";

  const hdr = el("div","exam-header");
  hdr.innerHTML="<span style='font-size:14px'>"+emoji+"</span>"+
    "<span class='exam-title' style='color:"+color+"'>"+name+"</span>"+
    "<span class='exam-tag'>EXAMS</span>";
  card.appendChild(hdr);

  if(upcoming.length===0){
    card.appendChild(el("div","",`<span style="color:#888;font-size:14px;font-style:italic">No upcoming exams 🎉</span>`));
    return card;
  }

  upcoming.forEach(function(e){
    const days=daysUntil(e.date);
    const uc=days<=2?"#ff6b6b":days<=7?"#ffd166":color;
    const row=el("div","exam-row");
    row.style.borderColor=uc+"33";
    row.innerHTML="<div class='exam-count'>"+
      "<div class='exam-date-lbl' style='color:"+uc+"'>"+fmtDate(e.date)+"</div>"+
      "<div class='exam-days-num' style='color:"+uc+"'>"+days+"</div>"+
      "<div class='exam-days-lbl' style='color:"+uc+"'>"+(days===1?"day left":"days left")+"</div></div>"+
      "<div class='exam-divider' style='background:"+uc+"33'></div>"+
      "<div style='flex:1;min-width:0'>"+
      "<div class='exam-subject'>"+e.subject+"</div>"+
      "<div class='exam-detail'>"+e.detail+"</div></div>";
    card.appendChild(row);
  });
  return card;
}

// ── BUILD CALENDAR CARD ───────────────────────────────────────────────
function buildCalCard(events, isToday){
  const card=el("div","card "+(isToday?"card-orange":"card-bluel"));
  if(!events||events.length===0){
    card.appendChild(el("div","cal-empty","Nothing scheduled"));
    return card;
  }
  events.forEach(function(ev){
    const c=PCOLORS[ev.person]||"#9B8EF7";
    const row=el("div","cal-row");
    const dot=el("span","cal-dot"); dot.style.background=c; row.appendChild(dot);
    const content=el("div");
    let html="";
    if(ev.time) html+="<span class='cal-time'>"+ev.time+"</span>";
    html+="<span class='cal-title'>"+ev.title+"</span>";
    if(ev.person) html+="<span class='cal-person' style='color:"+c+";background:"+c+"22'>"+ev.person+"</span>";
    if(ev.location) html+="<div class='cal-loc'>📍 "+ev.location+"</div>";
    content.innerHTML=html;
    row.appendChild(content);
    card.appendChild(row);
  });
  return card;
}

// ── BUILD WEATHER CARD ────────────────────────────────────────────────
function buildWeatherCard(d, isToday){
  const rh=d.rain>=60, rm=d.rain>=25;
  const rc=rh?"#60b4ff":rm?"#a78bfa":"#667777";
  const card=el("div","card "+(isToday?"card-blue":"card-blue2"));

  let rainStyle=rh?"background:rgba(96,180,255,0.12);border:1px solid "+rc+"44":
    rm?"background:rgba(167,139,250,0.10);border:1px solid "+rc+"44":
    "background:rgba(255,255,255,0.04);border:1px solid "+rc+"44";
  let rainColor=rh?"#93c5fd":rm?"#c4b5fd":"#778899";

  card.innerHTML=
    "<div class='wx-top'>"+
    "<div class='wx-icon'>"+d.icon+"</div>"+
    "<div><div style='display:flex;align-items:baseline;gap:4px;margin-bottom:2px'>"+
    "<span class='wx-label' style='color:"+(isToday?"#60b4ff":"#7ab8d8")+"'>"+d.label+"</span>"+
    "<span class='wx-date'>"+d.date+"</span></div>"+
    "<div class='wx-condition'>"+d.condition+"</div></div></div>"+
    "<div class='wx-temp'>"+
    "<span class='wx-high'>"+d.high+"°</span>"+
    "<span class='wx-sep'>/</span>"+
    "<span class='wx-low'>"+d.low+"°</span>"+
    "<span class='wx-unit'>C</span></div>"+
    "<div class='wx-pills'>"+
    "<div class='wx-pill wx-wind-pill'>"+
    "<span class='wx-pill-icon'>💨</span>"+
    "<div><div class='wx-pill-val' style='color:#d8eef8'>"+d.wind+" <span class='wx-pill-unit' style='color:#6a90a8'>m/s</span></div>"+
    "<div class='wx-pill-lbl'>WIND</div></div></div>"+
    "<div class='wx-pill' style='"+rainStyle+"'>"+
    "<span class='wx-pill-icon'>🌧</span>"+
    "<div><div class='wx-pill-val' style='color:"+rainColor+"'>"+d.rain+"<span class='wx-pill-unit' style='color:"+rc+"'>%</span></div>"+
    "<div class='wx-pill-lbl'>RAIN</div></div></div></div>";
  return card;
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const grid = document.getElementById("main-grid");
  grid.innerHTML="";

  const todayDow=getDow(0);
  const isWeekend=todayDow===0||todayDow===6;
  const tmrOff=getNextSchoolOff();
  const tmrDow=getDow(tmrOff);
  const tmrLabel=tmrOff===1?"Tomorrow":getDayName(tmrOff);
  const todayStr=getDateStr(0);
  const tmrStr=getDateStr(tmrOff);
  const todayEvts=CALENDAR_DATA.filter(function(e){return e.date===todayStr;});
  const tmrEvts=CALENDAR_DATA.filter(function(e){return e.date===tmrStr;});

  function lbl(text,color){ const d=el("div","section-label"); d.style.color=color||"#888"; d.innerHTML=text; return d; }

  // Row 1 - headers
  grid.appendChild(lbl("🎒 Today &mdash; <span style='color:#ffaa55'>"+(isWeekend?"Weekend":getDayName(0))+"</span>","#d4831a"));
  grid.appendChild(lbl("🎒 "+tmrLabel+" &mdash; <span style='color:#60b4ff'>"+getDayName(tmrOff)+"</span>","#3a9ee0"));

  // Row 2 - Sofia schedule
  grid.appendChild(buildChildCard("Sofia","#ffaa55","✏️",isWeekend?[]:SOFIA_SCHEDULE[todayDow],true));
  grid.appendChild(buildChildCard("Sofia","#ffaa55","✏️",SOFIA_SCHEDULE[tmrDow]||[],false));

  // Row 3 - Helen schedule
  grid.appendChild(buildChildCard("Helen","#60b4ff","📚",isWeekend?[]:HELEN_SCHEDULE[todayDow],true));
  grid.appendChild(buildChildCard("Helen","#60b4ff","📚",HELEN_SCHEDULE[tmrDow]||[],false));

  // Row 4 - Exam headers
  const eh1=lbl("📝 Upcoming exams","#c060c0"); eh1.style.marginTop="3px"; grid.appendChild(eh1);
  const eh2=lbl("📝 Upcoming exams","#c060c0"); eh2.style.marginTop="3px"; grid.appendChild(eh2);

  // Row 5 - Exams
  grid.appendChild(buildExamCard("Sofia","#ffaa55","✏️",SOFIA_EXAMS));
  grid.appendChild(buildExamCard("Helen","#60b4ff","📚",HELEN_EXAMS));

  // Row 6 - Calendar headers
  const ch1=lbl("📅 Calendar &mdash; Today","#d4831a"); ch1.style.marginTop="3px"; grid.appendChild(ch1);
  const ch2=lbl("📅 Calendar &mdash; "+tmrLabel,"#3a9ee0"); ch2.style.marginTop="3px"; grid.appendChild(ch2);

  // Row 7 - Calendar
  grid.appendChild(buildCalCard(todayEvts,true));
  grid.appendChild(buildCalCard(tmrEvts,false));

  // Row 8 - Weather headers
  const wh1=lbl("🌤 Weather &mdash; Today","#5a8ab0"); wh1.style.marginTop="3px"; grid.appendChild(wh1);
  const wh2=lbl("🌤 Weather &mdash; Tomorrow","#5a8ab0"); wh2.style.marginTop="3px"; grid.appendChild(wh2);

  // Row 9 - Weather (fetch live)
  const wp1=el("div","card"); wp1.innerHTML="<div class='loading'>Loading weather...</div>";
  const wp2=el("div","card"); wp2.innerHTML="<div class='loading'>Loading weather...</div>";
  grid.appendChild(wp1); grid.appendChild(wp2);

  const weatherUrl = "https://api.open-meteo.com/v1/forecast?latitude=60.17&longitude=24.94&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,precipitation_probability_max&wind_speed_unit=ms&timezone=Europe%2FHelsinki&forecast_days=2";
  const timeout = new Promise(function(_,reject){ setTimeout(function(){ reject(new Error("timeout")); }, 8000); });
  Promise.race([fetch(weatherUrl), timeout])
    .then(function(r){return r.json();})
    .then(function(d){
      const WMO={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",48:"Foggy",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Rain showers",81:"Rain showers",82:"Heavy showers",95:"Thunderstorm"};
      const WICO={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌦️",63:"🌧️",65:"🌧️",71:"🌨️",73:"❄️",75:"❄️",80:"🌧️",81:"🌧️",82:"⛈️",95:"⛈️"};
      [0,1].forEach(function(i){
        const dt=new Date(d.daily.time[i]);
        const code=d.daily.weathercode[i];
        const wx={
          label:i===0?"TODAY":"TOMORROW",
          date:WDAYS[dt.getDay()]+" "+dt.getDate()+"."+(dt.getMonth()+1),
          icon:WICO[code]||"⛅",
          condition:WMO[code]||"Mixed",
          high:Math.round(d.daily.temperature_2m_max[i]),
          low:Math.round(d.daily.temperature_2m_min[i]),
          wind:Math.round(d.daily.windspeed_10m_max[i]),
          rain:d.daily.precipitation_probability_max[i]||0,
        };
        const card=buildWeatherCard(wx,i===0);
        if(i===0) wp1.parentNode.replaceChild(card,wp1);
        else wp2.parentNode.replaceChild(card,wp2);
      });
    })
    .catch(function(){
      wp1.innerHTML="<div class='loading'>Weather unavailable<br><span style='font-size:10px;color:#444'>Tap to reload</span></div>";
      wp1.style.cursor="pointer";
      wp1.onclick=function(){location.reload();};
      wp2.innerHTML="<div class='loading'>&nbsp;</div>";
    });
}


// ── BUILD COUNTDOWN CARDS ─────────────────────────────────────────────
function buildCountdowns(){
  const section = document.getElementById("countdown-section");
  section.innerHTML = "";

  function daysTo(dateStr){
    const t = new Date(); t.setHours(0,0,0,0);
    return Math.max(0, Math.round((new Date(dateStr) - t) / 86400000));
  }

  const lbl = el("div","cd-section-label","✨ Highlights");
  section.appendChild(lbl);

  // School's out
  const d1 = daysTo("2026-05-30");
  const c1 = el("div","cd-card cd-school");
  c1.innerHTML =
    "<div class='cd-glow-school'></div>" +
    "<div class='cd-emoji'>🏖️</div>" +
    "<div class='cd-days'>" + d1 + "</div>" +
    "<div class='cd-days-label'>" + (d1===1?"day":"days") + " to go</div>" +
    "<div class='cd-title'>Schools Out<br>for Summer! 🎉</div>" +
    "<div class='cd-date'>30 May 2026</div>";
  section.appendChild(c1);

  // Greece
  const d2 = daysTo("2026-06-29");
  const c2 = el("div","cd-card cd-greece");
  c2.innerHTML =
    "<div class='cd-glow-greece'></div>" +
    "<div class='cd-emoji'>✈️🇬🇷</div>" +
    "<div class='cd-days'>" + d2 + "</div>" +
    "<div class='cd-days-label'>" + (d2===1?"day":"days") + " to go</div>" +
    "<div class='cd-title'>Greece<br>Here We Come! 🌊</div>" +
    "<div class='cd-date'>29 June 2026</div>";
  section.appendChild(c2);
}

buildCountdowns();
render();
// Re-render at midnight to flip today/tomorrow
const now=new Date();
const msToMidnight=(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now);
setTimeout(function(){
setInterval(render,86400000);},msToMidnight);
</script>
