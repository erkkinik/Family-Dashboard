// ── HELPERS ───────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,"0"); }
function getDow(off=0) { const d=new Date(); d.setDate(d.getDate()+off); return d.getDay(); }
function getDateStr(off=0) { const d=new Date(); d.setDate(d.getDate()+off); return d.toISOString().slice(0,10); }
function getDayName(off=0) { const n=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"]; const d=new Date(); d.setDate(d.getDate()+off); return n[d.getDay()]; }
function getNextSchoolOff() { for(let i=1;i<=7;i++){const d=getDow(i);if(d>=1&&d<=5)return i;} return 1; }
function toMins(t) { const[h,m]=t.split(":").map(Number); return h*60+m; }
function getStart(l) { return l && l.length > 0 ? l[0].time.split("–")[0] : null; }
function getEnd(l) { return l && l.length > 0 ? l[l.length-1].time.split("–")[1] : null; }
function daysUntil(ds) { const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(ds)-t)/86400000); }
function fmtDate(ds) { const d=new Date(ds); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."; }

// ── WEATHER HOOK ──────────────────────────────────────────────────────
const WMO = {0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",48:"Foggy",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Rain showers",81:"Rain showers",82:"Heavy showers",95:"Thunderstorm"};
const WICO = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌦️",63:"🌧️",65:"🌧️",71:"🌨️",73:"❄️",75:"❄️",80:"🌧️",81:"🌧️",82:"⛈️",95:"⛈️"};
const WDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function useWeather() {
  const [w, setW] = useState(null);
  useEffect(() => {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=60.17&longitude=24.94&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,precipitation_probability_max&wind_speed_unit=ms&timezone=Europe%2FHelsinki&forecast_days=2")
      .then(function(r) { return r.json(); })
      .then(function(d) {
        setW(d.daily.time.map(function(t, i) {
          const dt = new Date(t);
          const code = d.daily.weathercode[i];
          return {
            label: i===0 ? "TODAY" : "TOMORROW",
            date: WDAYS[dt.getDay()]+" "+dt.getDate()+"."+(dt.getMonth()+1),
            icon: WICO[code] || "⛅",
            condition: WMO[code] || "Mixed",
            high: Math.round(d.daily.temperature_2m_max[i]),
            low:  Math.round(d.daily.temperature_2m_min[i]),
            wind: Math.round(d.daily.windspeed_10m_max[i]),
            rain: d.daily.precipitation_probability_max[i] || 0,
          };
        }));
      })
      .catch(function(_e) {
        setW([
          {label:"TODAY",   date:"—",icon:"⛅",condition:"Unavailable",high:"—",low:"—",wind:"—",rain:0},
          {label:"TOMORROW",date:"—",icon:"⛅",condition:"Unavailable",high:"—",low:"—",wind:"—",rain:0},
        ]);
      });
  }, []);
  return w;
}

// ── CLOCK ─────────────────────────────────────────────────────────────
function Clock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t=setInterval(() => setNow(new Date()),1000); return () => clearInterval(t); }, []);
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return (
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:"clamp(26px,6.5vw,44px)",fontWeight:800,lineHeight:1,letterSpacing:"-2px",color:"#ffffff"}}>
        {pad(now.getHours())}:{pad(now.getMinutes())}
        <span style={{fontSize:"clamp(12px,3vw,16px)",color:"#555555",marginLeft:2}}>{pad(now.getSeconds())}</span>
      </div>
      <div style={{fontSize:11,color:"#777777",marginTop:3}}>{dayNames[now.getDay()]}, {now.getDate()} {months[now.getMonth()]}</div>
    </div>
  );
}

// ── CHILD CARD ────────────────────────────────────────────────────────
function ChildCard({ name, color, emoji, lessons, isToday }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    if (!isToday) return;
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, [isToday]);
  const noSchool = !lessons || lessons.length === 0;
  const nowMins = now.getHours()*60 + now.getMinutes();
  const isCur = (l) => { if(!isToday) return false; const[s,e]=l.time.split("–"); return nowMins>=toMins(s)&&nowMins<=toMins(e); };
  const isPast = (l) => { if(!isToday) return false; return nowMins > toMins(l.time.split("–")[1]); };
  return (
    <div style={{backgroundColor:C.card,border:"1.5px solid "+color+"66",borderRadius:12,padding:"12px 13px",boxSizing:"border-box",height:"100%",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontSize:14}}>{emoji}</span>
          <span style={{fontSize:15,fontWeight:700,color:color}}>{name}</span>
        </div>
        {!noSchool && <span style={{fontSize:10,color:color,backgroundColor:color+"22",padding:"2px 7px",borderRadius:20}}>ends {getEnd(lessons)}</span>}
      </div>
      {noSchool ? (
        <div style={{color:"#888888",fontSize:13,fontStyle:"italic",padding:"5px 0"}}>No school 🎉</div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:0,flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9,backgroundColor:color+"22",border:"1.5px solid "+color+"77",borderRadius:9,padding:"8px 12px"}}>
            <div>
              <div style={{fontSize:8,color:color,letterSpacing:"0.12em",marginBottom:2}}>SCHOOL STARTS</div>
              <div style={{fontSize:24,fontWeight:800,color:color,lineHeight:1}}>{getStart(lessons)}</div>
            </div>
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:8,color:"#aaaaaa",letterSpacing:"0.08em",marginBottom:2}}>LESSONS</div>
              <div style={{fontSize:15,fontWeight:600,color:"#ffffff"}}>{lessons.length}</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:2,flex:1}}>
            {lessons.map((l, i) => {
              const cur = isCur(l);
              const past = isPast(l);
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",borderRadius:6,backgroundColor:cur ? color+"22" : "transparent",border:cur ? "1px solid "+color+"55" : "1px solid transparent",opacity:past ? 0.38 : 1}}>
                  <span style={{fontSize:14,fontWeight:600,color:"#ffffff",minWidth:46,flexShrink:0}}>{l.time.split("–")[0]}</span>
                  <span style={{fontSize:14,color:"#ffffff"}}>{l.subject}</span>
                  {cur && <span style={{marginLeft:"auto",fontSize:8,color:color,backgroundColor:color+"33",padding:"1px 5px",borderRadius:7}}>NOW</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── EXAM CARD ─────────────────────────────────────────────────────────
function ExamCard({ exams, color, name, emoji }) {
  const today = getDateStr(0);
  const upcoming = exams.filter((e) => e.date >= today).sort((a,b) => a.date < b.date ? -1 : 1);
  return (
    <div style={{backgroundColor:C.card,border:"1.5px solid "+color+"44",borderRadius:12,padding:"12px 13px",boxSizing:"border-box",height:"100%",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:9}}>
        <span style={{fontSize:14}}>{emoji}</span>
        <span style={{fontSize:15,fontWeight:700,color:color}}>{name}</span>
        <span style={{marginLeft:"auto",fontSize:9,color:"#888888",letterSpacing:"0.08em"}}>EXAMS</span>
      </div>
      {upcoming.length === 0 ? (
        <div style={{color:"#888888",fontSize:13,fontStyle:"italic"}}>No upcoming exams 🎉</div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:7,flex:1}}>
          {upcoming.map((e, i) => {
            const days = daysUntil(e.date);
            const uc = days<=2 ? "#ff6b6b" : days<=7 ? "#ffd166" : color;
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 9px",borderRadius:9,backgroundColor:"rgba(255,255,255,0.04)",border:"1px solid "+uc+"33"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,width:52}}>
                  <div style={{fontSize:12,fontWeight:700,color:uc,lineHeight:1}}>{fmtDate(e.date)}</div>
                  <div style={{fontSize:20,fontWeight:800,color:uc,lineHeight:1,marginTop:3}}>{days}</div>
                  <div style={{fontSize:9,color:uc,lineHeight:1,marginTop:2,whiteSpace:"nowrap"}}>{days===1 ? "day left" : "days left"}</div>
                </div>
                <div style={{width:1,alignSelf:"stretch",backgroundColor:uc+"33",flexShrink:0}} />
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#ffffff",lineHeight:1.3}}>{e.subject}</div>
                  <div style={{fontSize:11,color:"#999999",marginTop:2,lineHeight:1.3}}>{e.detail}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── EVENT LIST ────────────────────────────────────────────────────────
const PCOLORS = { Helen:"#60b4ff", Sofia:"#ffaa55", Erkki:"#5dd68a" };
function EventList({ events }) {
  if (!events || events.length === 0) return <div style={{color:"#777777",fontSize:13,fontStyle:"italic"}}>Nothing scheduled</div>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      {events.map((ev, i) => {
        const c = PCOLORS[ev.person] || "#9B8EF7";
        return (
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:7}}>
            <span style={{width:7,height:7,borderRadius:"50%",backgroundColor:c,display:"inline-block",marginTop:5,flexShrink:0}} />
            <div>
              {ev.time && <span style={{fontSize:13,color:"#aaaaaa",backgroundColor:"rgba(255,255,255,0.08)",padding:"1px 5px",borderRadius:4,marginRight:5}}>{ev.time}</span>}
              <span style={{fontSize:15,fontWeight:500,color:"#ffffff"}}>{ev.title}</span>
              {ev.person && <span style={{fontSize:12,marginLeft:5,color:c,backgroundColor:c+"22",padding:"1px 6px",borderRadius:8}}>{ev.person}</span>}
              {ev.location && <div style={{fontSize:11,color:"#666666",marginTop:1}}>📍 {ev.location}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── WEATHER CARD ──────────────────────────────────────────────────────
function WeatherCard({ d, isToday }) {
  const rh=d.rain>=60, rm=d.rain>=25;
  const rc = rh ? "#60b4ff" : rm ? "#a78bfa" : "#667777";
  return (
    <div style={{backgroundColor:isToday?"#0f2440":"#0d1e2e",border:"1.5px solid "+(isToday?"rgba(96,180,255,0.35)":"rgba(96,180,255,0.20)"),borderRadius:12,padding:"13px 14px",boxSizing:"border-box",height:"100%",display:"flex",flexDirection:"column",gap:9,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:36,lineHeight:1,flexShrink:0}}>{d.icon}</div>
        <div>
          <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:2}}>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:isToday?"#60b4ff":"#7ab8d8"}}>{d.label}</span>
            <span style={{fontSize:10,color:"#445566"}}>{d.date}</span>
          </div>
          <div style={{fontSize:12,color:"#c0d8e8"}}>{d.condition}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"baseline",gap:5,borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:8}}>
        <span style={{fontSize:32,fontWeight:800,color:"#ffffff",lineHeight:1}}>{d.high}°</span>
        <span style={{fontSize:16,color:"#5a80a0"}}>/</span>
        <span style={{fontSize:20,fontWeight:600,color:"#5a80a0"}}>{d.low}°</span>
        <span style={{fontSize:10,color:"#445566",marginLeft:2}}>C</span>
      </div>
      <div style={{display:"flex",gap:7}}>
        <div style={{flex:1,backgroundColor:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"7px 9px",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:14}}>💨</span>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#d8eef8",lineHeight:1}}>{d.wind} <span style={{fontSize:9,fontWeight:400,color:"#6a90a8"}}>m/s</span></div>
            <div style={{fontSize:8,color:"#4a6a80",letterSpacing:"0.1em",marginTop:1}}>WIND</div>
          </div>
        </div>
        <div style={{flex:1,backgroundColor:rh?"rgba(96,180,255,0.12)":rm?"rgba(167,139,250,0.10)":"rgba(255,255,255,0.04)",border:"1px solid "+rc+"44",borderRadius:8,padding:"7px 9px",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:14}}>🌧</span>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:rh?"#93c5fd":rm?"#c4b5fd":"#778899",lineHeight:1}}>{d.rain}<span style={{fontSize:9,fontWeight:400,color:rc}}>%</span></div>
            <div style={{fontSize:8,color:"#4a6a80",letterSpacing:"0.1em",marginTop:1}}>RAIN</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── LOADING CARD ──────────────────────────────────────────────────────
function LoadingCard() {
  return <div style={{backgroundColor:C.card,borderRadius:12,padding:"20px",color:"#555555",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",height:"100%",boxSizing:"border-box"}}>Loading…</div>;
}

// ── APP ───────────────────────────────────────────────────────────────
export default function App() {
  const todayDow = getDow(0);
  const isWeekend = todayDow===0 || todayDow===6;
  const tmrOff = getNextSchoolOff();
  const tmrDow = getDow(tmrOff);
  const tmrLabel = tmrOff===1 ? "Tomorrow" : getDayName(tmrOff);
  const weather = useWeather();
  const calAll = useCalendar();
  const todayStr = getDateStr(0);
  const tmrStr = getDateStr(tmrOff);
  const todayEvts = calAll.filter(function(e) { return e.date===todayStr; });
  const tmrEvts = calAll.filter(function(e) { return e.date===tmrStr; });

  const base = new Date();
  const strip = Array.from({length:7}, (_, i) => {
    const d = new Date(base);
    d.setDate(base.getDate() - ((base.getDay()+6)%7) + i);
    return { label:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][i], date:d.getDate(), isToday:d.toDateString()===base.toDateString(), isWknd:i>=5 };
  });

  const LBL = {fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5,color:"#888888"};
  const calBox = (t) => ({backgroundColor:C.card, border:t?"1px solid rgba(255,170,85,0.30)":"1px solid rgba(96,180,255,0.30)", borderRadius:12, padding:"12px 13px", boxSizing:"border-box", height:"100%"});

  return (
    <div style={{minHeight:"100vh",backgroundColor:C.bg,fontFamily:"system-ui,-apple-system,sans-serif",display:"flex",flexDirection:"column"}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 14px 11px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div>
          <div style={{fontSize:"clamp(15px,4vw,20px)",fontWeight:800,letterSpacing:"-0.5px",background:"linear-gradient(90deg,#ffffff 30%,#60b4ff 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Family Dashboard</div>
          <div style={{fontSize:10,color:"#5dd68a",marginTop:2}}>✓ Perhekalenteri · Helsinki</div>
        </div>
        <Clock />
      </div>

      <div style={{display:"flex",gap:3,padding:"9px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        {strip.map((d, i) => (
          <div key={i} style={{flex:1,textAlign:"center",padding:"6px 2px",borderRadius:8,backgroundColor:d.isToday?"#1a73e8":d.isWknd?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.05)",border:d.isToday?"1px solid rgba(96,180,255,0.5)":"1px solid transparent"}}>
            <div style={{fontSize:8,letterSpacing:"0.06em",marginBottom:2,color:d.isToday?"#ffffff":d.isWknd?"#444444":"#888888"}}>{d.label}</div>
            <div style={{fontSize:13,fontWeight:700,color:d.isToday?"#ffffff":d.isWknd?"#444444":"#888888"}}>{d.date}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,padding:"11px 14px 14px",flex:1}}>

        <div style={{...LBL,color:"#d4831a"}}>🎒 Today — <span style={{color:"#ffaa55"}}>{isWeekend ? "Weekend" : getDayName(0)}</span></div>
        <div style={{...LBL,color:"#3a9ee0"}}>🎒 {tmrLabel} — <span style={{color:"#60b4ff"}}>{getDayName(tmrOff)}</span></div>

        <ChildCard name="Sofia" color="#ffaa55" emoji="✏️" lessons={isWeekend?[]:SOFIA_SCHEDULE[todayDow]} isToday={true} />
        <ChildCard name="Sofia" color="#ffaa55" emoji="✏️" lessons={SOFIA_SCHEDULE[tmrDow]||[]} isToday={false} />

        <ChildCard name="Helen" color="#60b4ff" emoji="📚" lessons={isWeekend?[]:HELEN_SCHEDULE[todayDow]} isToday={true} />
        <ChildCard name="Helen" color="#60b4ff" emoji="📚" lessons={HELEN_SCHEDULE[tmrDow]||[]} isToday={false} />

        <div style={{...LBL,color:"#c060c0",marginTop:3}}>📝 Upcoming exams</div>
        <div style={{...LBL,color:"#c060c0",marginTop:3}}>📝 Upcoming exams</div>

        <ExamCard name="Sofia" emoji="✏️" color="#ffaa55" exams={SOFIA_EXAMS} />
        <ExamCard name="Helen" emoji="📚" color="#60b4ff" exams={HELEN_EXAMS} />

        <div style={{...LBL,color:"#d4831a",marginTop:3}}>📅 Calendar — Today</div>
        <div style={{...LBL,color:"#3a9ee0",marginTop:3}}>📅 Calendar — {tmrLabel}</div>

        <div style={calBox(true)}><EventList events={todayEvts} /></div>
        <div style={calBox(false)}><EventList events={tmrEvts} /></div>

        <div style={{...LBL,color:"#5a8ab0",marginTop:3}}>🌤 Weather — Today</div>
        <div style={{...LBL,color:"#5a8ab0",marginTop:3}}>🌤 Weather — Tomorrow</div>

        <div>{weather ? <WeatherCard d={weather[0]} isToday={true} /> : <LoadingCard />}</div>
        <div>{weather ? <WeatherCard d={weather[1]} isToday={false} /> : <LoadingCard />}</div>

      </div>

      <div style={{padding:"6px 14px",borderTop:"1px solid rgba(255,255,255,0.05)",fontSize:9,color:"#333333"}}>
        Sofia: Mon/Wed/Thu 08:30 · Tue 09:15 · Fri 10:15 · Helen: Mon/Wed/Thu 08:15 · Tue/Fri 09:15
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
